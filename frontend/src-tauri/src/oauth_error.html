<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Erreur de connexion</title>
<style>
  body { font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f8f9fa; }
  .box { text-align: center; padding: 32px 48px; border-radius: 12px; background: #fff; box-shadow: 0 2px 16px rgba(0,0,0,0.1); }
  .icon { font-size: 48px; margin-bottom: 12px; }
  p { color: #202124; margin: 0 0 8px; }
  small { color: #70757a; }
</style>
</head>
<body>
<div class="box">
  <div class="icon">❌</div>
  <p><strong>Connexion annulée ou échouée.</strong></p>
  <small>Vous pouvez fermer cette fenêtre et réessayer.</small>
</div>
</body>
</html>
