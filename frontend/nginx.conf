server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Forward ICS proxy requests to the proxy service
    location /proxy {
        proxy_pass http://proxy:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Forward Google OAuth routes to the proxy service
    location /auth {
        proxy_pass http://proxy:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
