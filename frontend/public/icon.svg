<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" ry="96" fill="#1a73e8"/>

  <!-- Calendar body -->
  <rect x="80" y="120" width="352" height="320" rx="24" ry="24" fill="white"/>

  <!-- Calendar header (red top bar) -->
  <rect x="80" y="120" width="352" height="110" rx="24" ry="24" fill="#d93025"/>
  <rect x="80" y="182" width="352" height="48" fill="#d93025"/>

  <!-- Ring left -->
  <rect x="168" y="88" width="32" height="80" rx="16" ry="16" fill="white"/>
  <!-- Ring right -->
  <rect x="312" y="88" width="32" height="80" rx="16" ry="16" fill="white"/>

  <!-- Day number "27" in header -->
  <text x="256" y="218" font-family="Helvetica, Arial, sans-serif" font-weight="bold" font-size="88" fill="white" text-anchor="middle" dominant-baseline="middle">27</text>

  <!-- Weekday dots / grid rows -->
  <!-- Row 1: 7 dots -->
  <circle cx="144" cy="296" r="14" fill="#1a73e8"/>
  <circle cx="192" cy="296" r="14" fill="#5f6368"/>
  <circle cx="240" cy="296" r="14" fill="#5f6368"/>
  <circle cx="288" cy="296" r="14" fill="#5f6368"/>
  <circle cx="336" cy="296" r="14" fill="#5f6368"/>
  <circle cx="384" cy="296" r="14" fill="#d93025"/>

  <!-- Row 2 -->
  <circle cx="144" cy="352" r="14" fill="#5f6368"/>
  <circle cx="192" cy="352" r="14" fill="#5f6368"/>
  <circle cx="240" cy="352" r="14" fill="#1a73e8"/>
  <circle cx="288" cy="352" r="14" fill="#5f6368"/>
  <circle cx="336" cy="352" r="14" fill="#5f6368"/>
  <circle cx="384" cy="352" r="14" fill="#d93025"/>

  <!-- Row 3 -->
  <circle cx="144" cy="408" r="14" fill="#5f6368"/>
  <circle cx="192" cy="408" r="14" fill="#5f6368"/>
  <circle cx="240" cy="408" r="14" fill="#5f6368"/>
  <circle cx="288" cy="408" r="14" fill="#5f6368"/>
  <circle cx="336" cy="408" r="14" fill="#5f6368"/>
</svg>
